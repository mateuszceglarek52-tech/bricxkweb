<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>bricxk_ HUD</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* 🔥 SIDEBAR */
.sidebar {
  position: fixed;
  width: 220px;
  height: 100vh;
  background: #111;
  border-right: 1px solid #222;
  padding: 20px;
}

.nick {
  color: #00ff99;
  font-size: 22px;
  margin-bottom: 30px;
}

/* MENU BUTTONS */
.menu button {
  width: 100%;
  background: none;
  border: none;
  color: #888;
  text-align: left;
  padding: 10px 0;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.menu button:hover {
  color: #00ff99;
  transform: translateX(5px);
}

/* ACTIVE */
.menu button.active {
  color: #00ff99;
}

/* RANK */
.rank-box {
  margin-top: 30px;
  padding: 10px;
  border: 1px solid #00ff99;
}

.rank {
  color: #00ff99;
  font-size: 18px;
}

/* MAIN */
.main {
  margin-left: 240px;
  padding: 30px;
}

/* CARD */
.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
}

/* HIDE SYSTEM */
.section {
  display: none;
}

.section.active {
  display: block;
}

h2 {
  color: #00ff99;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="nick">bricxk_</div>

  <div class="menu">
    <button onclick="show('team')" class="active">TEAM</button>
    <button onclick="show('clips')">CLIPS</button>
    <button onclick="show('setup')">SETUP</button>
  </div>

  <div class="rank-box">
    <p style="margin:0;color:#888;">PREMIER</p>
    <div class="rank">3000 ELO</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div id="team" class="section active">
    <div class="card">
      <h2>TEAM</h2>
      <p>Solo queue / brak teamu</p>
    </div>
  </div>

  <div id="clips" class="section">
    <div class="card">
      <h2>CLIPS</h2>
      <p>Tu możesz wrzucać swoje highlighty z CS2</p>
    </div>
  </div>

  <div id="setup" class="section">
    <div class="card">
      <h2>SETUP</h2>
      <p>Myszka: Attack Shark R1 (800 DPI)</p>
      <p>Klawiatura: SMX Kishu</p>
      <p>Słuchawki: Mad Dog GH705</p>
    </div>
  </div>

</div>

<script>
function show(id) {
  // sections
  let sections = document.querySelectorAll('.section');
  sections.forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  // buttons
  let buttons = document.querySelectorAll('.menu button');
  buttons.forEach(b => b.classList.remove('active'));

  event.target.classList.add('active');
}
</script>

</body>
</html>
