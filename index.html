<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>bricxk_ cinematic v4</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  overflow: hidden;
}

/* 🔥 INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
  cursor: pointer;
  transition: opacity 1s ease, transform 1s ease;
}

#intro h1 {
  color: #00ff99;
  font-size: 60px;
  letter-spacing: 5px;
  animation: glow 1.5s infinite;
}

@keyframes glow {
  0%,100% { text-shadow: 0 0 5px #00ff99; }
  50% { text-shadow: 0 0 30px #00ff99; }
}

/* LOADING BAR */
.bar {
  width: 250px;
  height: 4px;
  background: #222;
  margin-top: 20px;
  overflow: hidden;
  border-radius: 10px;
}

.bar-fill {
  width: 0%;
  height: 100%;
  background: #00ff99;
  animation: load 2.5s forwards;
}

@keyframes load {
  to { width: 100%; }
}

#intro p {
  color: #666;
  margin-top: 10px;
  font-size: 14px;
}

/* INTRO EXIT */
#intro.hide {
  opacity: 0;
  transform: scale(1.1);
  pointer-events: none;
}

/* 🔥 MAIN */
#main {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

#main.show {
  opacity: 1;
  transform: translateY(0);
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 220px;
  height: 100vh;
  background: #111;
  border-right: 1px solid #222;
  padding: 20px;
}

.nick {
  color: #00ff99;
  font-size: 22px;
  margin-bottom: 30px;
  letter-spacing: 2px;
}

.menu button {
  width: 100%;
  background: none;
  border: none;
  color: #888;
  text-align: left;
  padding: 10px 0;
  cursor: pointer;
  transition: 0.2s;
}

.menu button:hover {
  color: #00ff99;
  transform: translateX(5px);
}

.menu button.active {
  color: #00ff99;
}

.rank-box {
  margin-top: 30px;
  padding: 10px;
  border: 1px solid #00ff99;
}

.rank {
  color: #00ff99;
  font-size: 18px;
}

/* MAIN AREA */
.main {
  margin-left: 240px;
  padding: 30px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
  border: 1px solid #00ff99;
}

h2 {
  color: #00ff99;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

a {
  color: #00ff99;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- 🔊 SOUND -->
<audio id="sound">
  <source src="https://www.myinstants.com/media/sounds/game-start.mp3">
</audio>

<!-- 🔥 INTRO -->
<div id="intro" onclick="start()">
  <h1>bricxk_</h1>
  <div class="bar"><div class="bar-fill"></div></div>
  <p>loading system...</p>
</div>

<!-- 🔥 MAIN -->
<div id="main">

  <div class="sidebar">
    <div class="nick">bricxk_</div>

    <div class="menu">
      <button onclick="show('team')" class="active">TEAM</button>
      <button onclick="show('clips')">CLIPS</button>
      <button onclick="show('setup')">SETUP</button>
    </div>

    <div class="rank-box">
      <p style="margin:0;color:#888;">PREMIER</p>
      <div class="rank">3000 ELO</div>
    </div>
  </div>

  <div class="main">

    <div id="team" class="section active">
      <div class="card">
        <h2>BR SHOOTERS</h2>
        <p>Official squad</p>
      </div>
    </div>

    <div id="clips" class="section">
      <div class="card">
        <h2>CLIPS</h2>
        <a href="https://www.youtube.com/@brixxk12" target="_blank">
          youtube.com/@brixxk12
        </a>
      </div>
    </div>

    <div id="setup" class="section">
      <div class="card">
        <h2>SETUP</h2>
        <p>Attack Shark R1 (800 DPI)</p>
        <p>SMX Kishu</p>
        <p>Mad Dog GH705</p>
      </div>
    </div>

  </div>

</div>

<script>

function start() {
  const intro = document.getElementById("intro");
  const main = document.getElementById("main");
  const sound = document.getElementById("sound");

  sound.play();

  setTimeout(() => {
    intro.classList.add("hide");
    main.classList.add("show");
  }, 2500);
}

function show(id) {
  let sections = document.querySelectorAll('.section');
  sections.forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  let buttons = document.querySelectorAll('.menu button');
  buttons.forEach(b => b.classList.remove('active'));

  event.target.classList.add('active');
}

</script>

</body>
</html>
