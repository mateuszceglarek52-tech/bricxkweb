<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR SHOOTERS | Bright White</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #1a1a1a; /* Jaśniejsze tło główne */
            color: #ffffff;
            overflow: hidden;
            user-select: none;
        }

        /* 🔥 INTRO */
        #intro {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #111111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .intro-logo {
            width: 260px;
            height: 260px;
            object-fit: cover; /* Zapewnia, że logo wypełni kwadrat */
            border-radius: 20px; /* Kwadrat z lekko zaokrąglonymi rogami */
            border: 2px solid rgba(255, 255, 255, 0.1);
            animation: white-glow 2.5s infinite alternate;
        }

        @keyframes white-glow {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
            100% { transform: scale(1.03); box-shadow: 0 0 40px rgba(255, 255, 255, 0.5); }
        }

        /* LOADING BAR */
        .bar {
            width: 250px;
            height: 4px;
            background: #333;
            margin-top: 40px;
            overflow: hidden;
            border-radius: 2px;
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            background: #ffffff;
            box-shadow: 0 0 15px #ffffff;
            animation: load 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes load { to { width: 100%; } }

        #intro p {
            color: #888;
            margin-top: 15px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        #intro.hide {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        /* 🔥 MAIN STRUCTURE */
        #main {
            opacity: 0;
            display: flex;
            height: 100vh;
            transition: 1.5s ease;
        }

        #main.show { opacity: 1; }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #222222; /* Wyraźniejszy sidebar */
            border-right: 1px solid #333;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        .team-name {
            color: #ffffff;
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 50px;
            letter-spacing: 3px;
            text-align: center;
            text-transform: uppercase;
            border-bottom: 2px solid #ffffff;
            padding-bottom: 10px;
        }

        .menu { flex-grow: 1; }

        .menu button {
            width: 100%;
            background: none;
            border: none;
            color: #888;
            text-align: left;
            padding: 18px 15px;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            border-radius: 8px;
        }

        .menu button:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .menu button.active {
            color: #000;
            background: #ffffff; /* Odwrócenie kolorów dla aktywnego przycisku */
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        .rank-box {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #444;
            text-align: center;
        }

        .rank-label {
            color: #aaa;
            font-size: 10px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .rank {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
        }

        /* CONTENT Area */
        .content-area {
            flex-grow: 1;
            padding: 80px;
            overflow-y: auto;
            background: #1a1a1a;
        }

        .section {
            display: none;
            animation: fadeIn 0.6s ease forwards;
        }

        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .card {
            background: #252525;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #333;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            color: #ffffff;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 26px;
        }

        p { color: #cccccc; line-height: 1.8; font-size: 15px; }

        .setup-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }

        .setup-item span:first-child { color: #888; font-weight: bold; }
        .setup-item span:last-child { color: #ffffff; }

        a {
            display: inline-block;
            margin-top: 25px;
            color: #000;
            background: #ffffff;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 12px;
            transition: 0.3s;
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
        }
    </style>
</head>

<body>

<audio id="sound">
    <source src="https://www.myinstants.com/media/sounds/game-start.mp3">
</audio>

<div id="intro" onclick="start()">
    <img src="BRRR.jpg" alt="Logo BR SHOOTERS" class="intro-logo">
    <div class="bar"><div class="bar-fill"></div></div>
    <p>Kliknij, aby wejść</p>
</div>

<div id="main">
    <div class="sidebar">
        <div class="team-name">BR SHOOTERS</div>
        <div class="menu">
            <button onclick="show(this, 'team')" class="active">Profil</button>
            <button onclick="show(this, 'clips')">Media</button>
            <button onclick="show(this, 'setup')">Sprzęt</button>
        </div>
        <div class="rank-box">
            <div class="rank-label">Premier Rating</div>
            <div class="rank">3000 ELO</div>
        </div>
    </div>

    <div class="content-area">
        <div id="team" class="section active">
            <div class="card">
                <h2>O NAS</h2>
                <p>Ekipa <strong>BR SHOOTERS</strong> stawia na profesjonalizm i czystą grę. Witaj w naszym centrum operacyjnym.</p>
            </div>
        </div>

        <div id="clips" class="section">
            <div class="card">
                <h2>CLIPS</h2>
                <p>Nasze najlepsze zagrania znajdziesz na kanale:</p>
                <a href="https://www.youtube.com/@brixxk12" target="_blank">ZOBACZ FILMY</a>
            </div>
        </div>

        <div id="setup" class="section">
            <div class="card">
                <h2>SETUP</h2>
                <div class="setup-item"><span>Mysz</span> <span>Attack Shark R1</span></div>
                <div class="setup-item"><span>Klawisze</span> <span>SMX Kishu</span></div>
                <div class="setup-item"><span>Dźwięk</span> <span>Mad Dog GH705</span></div>
            </div>
        </div>
    </div>
</div>

<script>
function start() {
    const intro = document.getElementById("intro");
    const main = document.getElementById("main");
    const sound = document.getElementById("sound");
    sound.play().catch(e => {});
    intro.classList.add("hide");
    setTimeout(() => { main.classList.add("show"); }, 400);
}

function show(btn, id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
</script>

</body>
</html>
